name: puba
channels:
  - conda-forge
dependencies:
  - python>=3.11
  - pypdf
  - pdfplumber
  - tiktoken
  - openai
  - httpx
  - pydantic>=2
  - tenacity
  - python-dotenv
  - pyyaml
  - rich
  - typer
  - bibtexparser
  - requests
  - pip
  - pip:
    - "mineru[pipeline]>=3.4"
    - "accelerate>=1.14"
    - "opencv-python-headless>=4.13"
    - -e .
